version: "3.2"

services:
  token-administration-api:
    image: token-administration-api
    build:
      context: TokenAdministrationApi/
      dockerfile: ./Dockerfile
    ports:
      - 3000:3000
    environment:
      - CONNECTION_STRING=Host=dev-database;Port=5432;Database=entitycorex;Username=postgres;Password=mypassword
    links:
      - dev-database
  dev-database:
    env_file:
      - database.env
    image: postgres:12
    volumes:
      - ./database:/docker-entrypoint-initdb.d

  token-administration-api-test:
    image: token-administration-api-test
    build:
      context: .
      dockerfile: TokenAdministrationApi.Tests/Dockerfile
    environment:
      - DB_HOST=test-database
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=mypassword
      - DB_DATABASE=testdb
    links:
      - test-database
  test-database:
    image: test-database
    build:
      context: .
      dockerfile: database/Dockerfile
    ports:
      - 5432:5432
    env_file:
      - database.env

  token-administration-api-dev:
    image: token-administration-api-dev
    build:
      context: TokenAdministrationApi/
      dockerfile: ./Dockerfile
    ports:
      - 3000:3000
    environment:
      - CONNECTION_STRING=Host=host.docker.internal;Port=5433;Database=devdb;Username=postgres;Password=mypassword
      - jwtSecret=this_is_a_very_long_secret_key_123456
    links:
      - local-dev-database

  local-dev-database:
    image: postgres:16
    container_name: dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/docker-entrypoint-initdb.d
